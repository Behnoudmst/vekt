services:
  inngest:
    image: inngest/inngest:latest
    ports:
      - "127.0.0.1:8288:8288"
    # http://app:3000 is the Docker-internal hostname for the app service
    command: inngest start --sdk-url http://app:3000/api/inngest
    environment:
      INNGEST_EVENT_KEY: "${INNGEST_EVENT_KEY:?INNGEST_EVENT_KEY is required}"
      INNGEST_SIGNING_KEY: "${INNGEST_SIGNING_KEY:?INNGEST_SIGNING_KEY is required}"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - inngest
    environment:
      # ── Required ────────────────────────────────────────────────────────────
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET is required}"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      DATABASE_URL: "file:/data/app.db"

      # ── Seed accounts ───────────────────────────────────────────────────────
      SEED_ON_START: "${SEED_ON_START:-false}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@example.com}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-}"

      # ── AI evaluation ───────────────────────────────────────────────────────
      # Choices: mock (default) | openai | ollama
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-}"

      # ── Inngest (durable pipeline) ───────────────────────────────────────────
      INNGEST_BASE_URL: "http://inngest:8288"
      INNGEST_EVENT_KEY: "${INNGEST_EVENT_KEY:?INNGEST_EVENT_KEY is required}"
      INNGEST_SIGNING_KEY: "${INNGEST_SIGNING_KEY:?INNGEST_SIGNING_KEY is required}"
      # URL Inngest uses to call back into the app
      INNGEST_APP_URL: "${NEXTAUTH_URL:-http://app:3000}/api/inngest"

      # ── Branding & logging ──────────────────────────────────────────────────
      COMPANY_NAME: "${COMPANY_NAME:-Vekt}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - db-data:/data                  # SQLite database file
      - uploads:/app/private/uploads   # Candidate resume uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads:
